name: Deploy to HF Hub

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        default: "manual"
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl "huggingface-hub>=0.27"

      - name: Generate dataset
        run: python generate_dataset.py

      - name: Validate output files
        run: |
          for f in cacd_dataset.csv cacd_dataset.json cacd_dataset.parquet cacd_dataset.xlsx; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f"
              exit 1
            fi
            echo "OK: $f ($(wc -c < "$f") bytes)"
          done

      - name: Upload to HF Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "SKIP: HF_TOKEN not set"
            exit 0
          fi
          pip install "huggingface-hub>=0.27"
          python -c "
from huggingface_hub import HfApi
api = HfApi()
files = ['cacd_dataset.csv', 'cacd_dataset.json', 'cacd_dataset.parquet', 'cacd_dataset.xlsx', 'README.md']
api.upload_folder(
    folder_path='.',
    path_in_repo='.',
    repo_id='profgabrielramos/cespe-cacd',
    repo_type='dataset',
    delete_patterns=files,
)
for f in files:
    api.upload_file(
        path_or_fileobj=f,
        path_in_repo=f,
        repo_id='profgabrielramos/cespe-cacd',
        repo_type='dataset',
    )
    print(f'Uploaded: {f}')
"
