on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pandas openpyxl "huggingface-hub>=0.27"
      - name: Generate dataset
        run: python generate_dataset.py
      - name: Validate output
        run: |
          for f in cacd_dataset.csv cacd_dataset.json cacd_dataset.parquet cacd_dataset.xlsx; do
            [ -f "$f" ] && echo "OK: $f" || { echo "Missing: $f"; exit 1; }
          done
      - name: Upload to HF Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          [ -z "$HF_TOKEN" ] && echo "SKIP: no token" && exit 0
          python -c "
import os
from huggingface_hub import HfApi
api = HfApi()
for f in ['cacd_dataset.csv', 'cacd_dataset.json', 'cacd_dataset.parquet', 'cacd_dataset.xlsx', 'README.md']:
    if os.path.exists(f):
        api.upload_file(path_or_fileobj=f, path_in_repo=f, repo_id='profgabrielramos/cespe-cacd', repo_type='dataset')
        print(f'Uploaded: {f}')
"
